apiVersion: v1
kind: ServiceAccount
metadata:
  name: rustfs-operator
  namespace: rustfs-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rustfs-operator
rules:
  - apiGroups: ["rustfs.com"]
    resources: ["buckets", "users", "policies"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["rustfs.com"]
    resources: ["buckets/status", "users/status", "policies/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["rustfs.com"]
    resources: ["clusterconnections"]
    verbs: ["get", "list", "watch"]
  # connection and user-credential secrets (can be scoped to the operator
  # namespace with a Role if only ClusterConnection is used; see Helm chart)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rustfs-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rustfs-operator
subjects:
  - kind: ServiceAccount
    name: rustfs-operator
    namespace: rustfs-operator
