# Example: manage a bucket, a policy and a user on a RustFS server.
#
# Two connection styles are shown:
#  - `connection.secretRef`: connection Secret in the resource's namespace
#  - `connection.clusterRef`: centrally managed ClusterConnection (admin
#    credentials Secret lives only in the operator's namespace)
---
# --- centrally managed connection (cluster-scoped) ---
# The credentials Secret is created in the OPERATOR's namespace:
#   kubectl -n rustfs-operator create secret generic rustfs-admin \
#     --from-literal=accessKey=rustfsadmin --from-literal=secretKey=rustfsadmin
apiVersion: rustfs.com/v1alpha1
kind: ClusterConnection
metadata:
  name: prod
spec:
  endpoint: http://rustfs.storage.svc:9000
  credentialsSecretRef: rustfs-admin
  # region: us-east-1
  # insecure: true
  # Restrict which namespaces may use this connection (absent = all):
  allowedNamespaces: ["default", "team-a"]
---
apiVersion: rustfs.com/v1alpha1
kind: Bucket
metadata:
  name: central-bucket
spec:
  connection:
    clusterRef: prod
  versioning: true
apiVersion: v1
kind: Secret
metadata:
  name: rustfs-conn
stringData:
  endpoint: http://rustfs.storage.svc:9000
  accessKey: rustfsadmin
  secretKey: rustfsadmin
  # region: us-east-1     # optional
  # insecure: "true"      # optional, skip TLS verification
---
apiVersion: v1
kind: Secret
metadata:
  name: app-user-creds
stringData:
  secretKey: change-me-please
---
apiVersion: rustfs.com/v1alpha1
kind: Bucket
metadata:
  name: app-data
spec:
  connection:
    secretRef: rustfs-conn
  versioning: true
  quotaBytes: 10737418240   # 10 GiB
  deletionPolicy: Retain
---
apiVersion: rustfs.com/v1alpha1
kind: Policy
metadata:
  name: app-data-rw
spec:
  connection:
    secretRef: rustfs-conn
  document:
    Version: "2012-10-17"
    Statement:
      - Effect: Allow
        Action: ["s3:GetObject", "s3:PutObject", "s3:DeleteObject", "s3:ListBucket"]
        Resource: ["arn:aws:s3:::app-data", "arn:aws:s3:::app-data/*"]
---
apiVersion: rustfs.com/v1alpha1
kind: User
metadata:
  name: app-user
spec:
  connection:
    secretRef: rustfs-conn
  secretKeyRef:
    name: app-user-creds
    key: secretKey
  policies: ["app-data-rw"]
  enabled: true
