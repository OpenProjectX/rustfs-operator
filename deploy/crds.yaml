              observedGeneration:
                description: Generation last acted upon.
                format: int64
                nullable: true
                type: integer
              ready:
                default: false
                description: True once the remote resource matches the spec.
                type: boolean
            type: object
        required:
        - spec
        title: User
        type: object
    served: true
    storage: true
    subresources:
      status: {}
